<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="/config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(10, 0, 20, 0.88);
            border: 1px solid rgba(255, 105, 180, 0.3);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 0 60px rgba(255, 20, 147, 0.15);
            backdrop-filter: blur(12px);
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            color: #ff69b4;
            text-align: center;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 182, 193, 0.45);
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: rgba(255, 182, 193, 0.6);
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 105, 180, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color .2s;
        }

        input:focus { border-color: rgba(255, 105, 180, 0.6); }

        input.err { border-color: rgba(255, 80, 80, 0.7); }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 6px;
            box-shadow: 0 6px 24px rgba(255, 20, 147, 0.4);
            transition: transform .2s, box-shadow .2s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,20,147,.55); }
        .btn:active { transform: translateY(0); }

        .msg {
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .msg.ok  { background: rgba(50,200,100,.12); border: 1px solid rgba(50,200,100,.3); color: #7fdc9f; }
        .msg.err { background: rgba(255,60,60,.1);   border: 1px solid rgba(255,60,60,.3);  color: #ff9090; }

        .current-price {
            text-align: center;
            color: rgba(255, 182, 193, 0.5);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .current-price span {
            color: #ffd700;
            font-weight: 700;
            font-size: 16px;
        }

        #panel-login  { display: block; }
        #panel-admin  { display: none; }

        /* ── Таблица страниц ── */
        .pages-section {
            margin-top: 28px;
            border-top: 1px solid rgba(255, 105, 180, 0.15);
            padding-top: 20px;
        }

        .pages-title {
            color: #ff69b4;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }

        .pages-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pages-list::-webkit-scrollbar { width: 4px; }
        .pages-list::-webkit-scrollbar-track { background: transparent; }
        .pages-list::-webkit-scrollbar-thumb { background: rgba(255,105,180,0.3); border-radius: 4px; }

        .page-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 105, 180, 0.12);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .page-info {
            flex: 1;
            min-width: 0;
        }

        .page-name {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .page-meta {
            color: rgba(255,182,193,0.45);
            font-size: 11px;
            margin-top: 3px;
        }

        .page-link {
            color: #ff69b4;
            text-decoration: none;
            font-size: 12px;
            white-space: nowrap;
        }
        .page-link:hover { text-decoration: underline; }

        .badge {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge.paid {
            background: rgba(50, 200, 100, 0.15);
            border: 1px solid rgba(50, 200, 100, 0.3);
            color: #7fdc9f;
        }

        .badge.pending {
            background: rgba(255, 200, 50, 0.12);
            border: 1px solid rgba(255, 200, 50, 0.3);
            color: #ffd966;
        }

        .btn-confirm {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 8px;
            border: 1px solid rgba(50, 200, 100, 0.4);
            background: rgba(50, 200, 100, 0.1);
            color: #7fdc9f;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background .2s;
        }
        .btn-confirm:hover { background: rgba(50, 200, 100, 0.25); }

        .page-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            flex-shrink: 0;
        }

        .pages-empty {
            color: rgba(255,182,193,0.35);
            font-size: 13px;
            text-align: center;
            padding: 20px 0;
        }

        .pages-count {
            color: rgba(255,182,193,0.4);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .refresh-btn {
            background: none;
            border: 1px solid rgba(255,105,180,0.25);
            color: #ff69b4;
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color .2s;
        }
        .refresh-btn:hover { border-color: rgba(255,105,180,0.6); }

        .pages-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
    <canvas id="rain"></canvas>

    <div class="card">

        <!-- Форма входа -->
        <div id="panel-login">
            <div class="title">Админ панель</div>
            <div class="subtitle">HAPPY BIRTHDAY</div>

            <div class="field">
                <label>Пароль</label>
                <input type="password" id="inp-pass" placeholder="••••••••••">
            </div>

            <button class="btn" id="btn-login">Войти</button>
            <div class="msg" id="msg-login"></div>
        </div>

        <!-- Панель управления -->
        <div id="panel-admin">
            <div class="title">Управление</div>
            <div class="subtitle">НАСТРОЙКИ</div>

            <div class="current-price">
                Текущая цена: <span id="cur-price">—</span> ⭐
            </div>

            <div class="field">
                <label>Новая цена (Stars)</label>
                <input type="number" id="inp-stars" min="1" max="10000" placeholder="Например: 50">
            </div>

            <button class="btn" id="btn-save">Сохранить</button>
            <div class="msg" id="msg-admin"></div>

            <!-- Список страниц -->
            <div class="pages-section">
                <div class="pages-header">
                    <div class="pages-title">📋 Страницы</div>
                    <button class="refresh-btn" id="btn-refresh">🔄 Обновить</button>
                </div>
                <div class="pages-count" id="pages-count"></div>
                <div class="pages-list" id="pages-list">
                    <div class="pages-empty">Загрузка...</div>
                </div>
            </div>
        </div>

    </div>

    <script>
    // ── Matrix Rain ───────────────────────────────────────────
    (function(){
        const canvas = document.getElementById('rain');
        const ctx    = canvas.getContext('2d');
        const chars  = 'HAPPYBIRTHDAY'.split('');
        let cols, drops;

        function resize(){
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            cols  = Math.floor(canvas.width / 25);
            drops = Array(cols).fill(1);
        }
        resize();
        window.addEventListener('resize', resize);

        setInterval(()=>{
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = '15px monospace';
            drops.forEach((y, i) => {
                const c = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillStyle = Math.random() > 0.5 ? '#ff69b4' : '#ff1493';
                ctx.shadowColor = '#ff69b4';
                ctx.shadowBlur  = 6;
                ctx.fillText(c, i * 25, y * 25);
                if (y * 25 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    })();

    // ── Admin Logic ───────────────────────────────────────────
    const API = window.APP_API_URL || 'http://localhost:3000';
    let adminToken = null;

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `msg ${type}`;
        el.style.display = 'block';
    }

    // Логин
    document.getElementById('btn-login').addEventListener('click', async () => {
        const pass = document.getElementById('inp-pass').value;
        if (!pass) { document.getElementById('inp-pass').classList.add('err'); return; }

        try {
            const r = await fetch(`${API}/admin/login`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ password: pass })
            });
            const d = await r.json();
            if (!r.ok) { showMsg('msg-login', '❌ ' + d.error, 'err'); return; }

            adminToken = d.token;
            document.getElementById('panel-login').style.display = 'none';
            document.getElementById('panel-admin').style.display = 'block';
            loadInfo();
        } catch(e) {
            showMsg('msg-login', '❌ Сервер недоступен', 'err');
        }
    });

    document.getElementById('inp-pass').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // Загрузить текущую цену + страницы
    async function loadInfo() {
        try {
            const r = await fetch(`${API}/admin/info?token=${adminToken}`);
            const d = await r.json();
            document.getElementById('cur-price').textContent = d.starsPrice;
            document.getElementById('inp-stars').value = d.starsPrice;
        } catch(e) {}
        loadPages();
    }

    // Загрузить список страниц
    async function loadPages() {
        const list = document.getElementById('pages-list');
        const count = document.getElementById('pages-count');
        try {
            const r = await fetch(`${API}/admin/pages?token=${adminToken}`);
            const d = await r.json();
            if (!r.ok) { list.innerHTML = '<div class="pages-empty">Ошибка загрузки</div>'; return; }

            const pages = d.pages || [];
            const paidCount = pages.filter(p => p.paid).length;
            const pendingCount = pages.length - paidCount;
            count.textContent = `Всего: ${pages.length} · Оплачено: ${paidCount} · Ожидание: ${pendingCount}`;

            if (pages.length === 0) {
                list.innerHTML = '<div class="pages-empty">Нет созданных страниц</div>';
                return;
            }

            list.innerHTML = pages.map(p => {
                const date = new Date(p.createdAt).toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
                const badge = p.paid
                    ? '<span class="badge paid">✅ Оплачено</span>'
                    : '<span class="badge pending">⏳ Ожидание</span>';
                const confirmBtn = p.paid
                    ? ''
                    : `<button class="btn-confirm" onclick="confirmPaid('${esc(p.id)}')">✅ Подтвердить</button>`;
                const pageUrl = `/${p.id}`;
                return `<div class="page-row" id="row-${esc(p.id)}">
                    <div class="page-info">
                        <div class="page-name">${esc(p.name)}</div>
                        <div class="page-meta">📷 ${p.photosCount} фото · ${date}</div>
                        <a class="page-link" href="${pageUrl}" target="_blank">${p.id}</a>
                    </div>
                    <div class="page-status">
                        ${badge}
                        ${confirmBtn}
                    </div>
                </div>`;
            }).join('');
        } catch(e) {
            list.innerHTML = '<div class="pages-empty">❌ Сервер недоступен</div>';
        }
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    document.getElementById('btn-refresh').addEventListener('click', loadPages);

    // Ручное подтверждение оплаты
    window.confirmPaid = async function(pageId) {
        if (!confirm(`Подтвердить оплату для "${pageId}"?`)) return;
        try {
            const r = await fetch(`${API}/page/${pageId}/mark-paid`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken })
            });
            if (r.ok) {
                loadPages();
            } else {
                alert('Ошибка при подтверждении');
            }
        } catch(e) {
            alert('Сервер недоступен');
        }
    };

    // Сохранить цену
    document.getElementById('btn-save').addEventListener('click', async () => {
        const stars = parseInt(document.getElementById('inp-stars').value);
        if (!stars || stars < 1) {
            document.getElementById('inp-stars').classList.add('err');
            return;
        }
        document.getElementById('inp-stars').classList.remove('err');

        try {
            const r = await fetch(`${API}/admin/set-price`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ token: adminToken, stars })
            });
            const d = await r.json();
            if (!r.ok) { showMsg('msg-admin', '❌ ' + d.error, 'err'); return; }

            document.getElementById('cur-price').textContent = d.starsPrice;
            showMsg('msg-admin', `✅ Цена обновлена: ${d.starsPrice} ⭐`, 'ok');
        } catch(e) {
            showMsg('msg-admin', '❌ Сервер недоступен', 'err');
        }
    });
    </script>
</body>
</html>
